<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartGuard | Remote</title>
    <link rel="icon" type="image/jpeg" href="/static/logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0f172a;       /* Deep Slate */
            --card-bg: #1e293b;       /* Lighter Slate for contrast */
            --accent-color: #3b82f6;  /* Vibrant Blue */
            --text-main: #f8fafc;     /* Crisp White */
            --text-muted: #cbd5e1;    /* High-contrast light grey */
            --border-color: #334155;  /* Visible separator lines */
        }
        
        body { 
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 0%, #1f1f2e 0%, transparent 70%);
            color: var(--text-main); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Subtle entrance animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* High-Contrast Card */
        .remote-card { 
            background: var(--card-bg); 
            padding: 35px 25px; 
            border-radius: 16px; 
            width: 90%; 
            max-width: 380px; 
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: fadeIn 0.5s ease-out forwards;
        }

        .header-icon {
            font-size: 2.8rem;
            color: var(--accent-color);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.4));
        }

        h3 { font-weight: 700; font-size: 1.5rem; letter-spacing: -0.5px; margin-bottom: 5px; color: var(--text-main); }
        p.subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px; }

        /* Custom Toggle Switch */
        .switch-container {
            background-color: var(--bg-dark);
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }
        
        .form-check-input { width: 3em !important; height: 1.5em !important; cursor: pointer; background-color: #475569; border-color: #475569; }
        .form-check-input:checked { background-color: var(--accent-color); border-color: var(--accent-color); }
        .toggle-label { font-weight: 600; margin: 0; display: flex; align-items: center; gap: 10px; color: var(--text-main); }

        /* Modern Buttons */
        .btn-custom { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 15px; 
            font-weight: 600; 
            border-radius: 10px; 
            border: none;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-custom:active { transform: scale(0.97); }
        
        .btn-real { background: rgba(16, 185, 129, 0.15); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.3); }
        .btn-real:hover, .btn-real:focus { background: rgba(16, 185, 129, 0.25); color: #a7f3d0; }
        
        .btn-sim { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-sim:hover, .btn-sim:focus { background: rgba(239, 68, 68, 0.25); color: #fecaca; }

        /* Dynamic Status Area */
        #status-area {
            margin-top: 25px;
            padding: 12px;
            border-radius: 10px;
            background: rgba(0,0,0,0.2);
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
        }
        
        /* Text Color Overrides for Status */
        .text-success-custom { color: #6ee7b7 !important; }
        .text-danger-custom { color: #fca5a5 !important; }
        .text-info-custom { color: #93c5fd !important; }
        
        /* Radar Animation for Auto-Sync */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        .radar-active { animation: pulse-ring 2s infinite; border-radius: 50%; }

    </style>
</head>
<body>

    <div class="remote-card">
        <img src="/static/logo.jpg" alt="SmartGuard Logo" style="height: 75px; width: auto; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 0 12px rgba(59, 130, 246, 0.4);">
        <h3>SmartGuard</h3>
        <p class="subtitle">Secure Mobile Key</p>

        <div class="switch-container">
            <label class="toggle-label" for="autoTrack">
                <i class="fa-solid fa-satellite-dish" id="radar-icon"></i> Live Radar
            </label>
            <div class="form-check form-switch m-0 p-0">
                <input class="form-check-input" type="checkbox" role="switch" id="autoTrack" onchange="toggleAutoTrack()">
            </div>
        </div>

        <button class="btn-custom btn-real" onclick="sendRealLocation()">
            <i class="fa-solid fa-location-crosshairs"></i> Send Exact Location
        </button>

        <button class="btn-custom btn-sim" onclick="simulateAway()">
            <i class="fa-solid fa-person-running"></i> Simulate "Away"
        </button>

        <div id="status-area">
            <i class="fa-solid fa-circle-info"></i> 
            <span id="status-text">System Idle</span>
        </div>
    </div>

    <script>
        // Generate or retrieve a persistent Device ID
        let deviceId = localStorage.getItem('smartguard_device_id');
        if (!deviceId) {
            deviceId = 'device_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('smartguard_device_id', deviceId);
        }

        let watchId = null; 
        let lastSentTime = 0; 
        
        const statusText = document.getElementById('status-text');
        const radarIcon = document.getElementById('radar-icon');
        const autoToggle = document.getElementById('autoTrack');

        function updateStatus(message, type) {
            statusText.textContent = message;
            statusText.className = ""; 
            if(type === 'success') statusText.classList.add('text-success-custom');
            if(type === 'error') statusText.classList.add('text-danger-custom');
            if(type === 'info') statusText.classList.add('text-info-custom');
        }

        function postData(lat, lon, mode) {
            updateStatus(`Sending ${mode}...`, 'info');
            fetch('/update_location', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-API-KEY': '{{ api_key }}' 
                },
                body: JSON.stringify({ lat: lat, lon: lon, device_id: deviceId }) 
            })
            .then(res => {
                if (res.status === 401) {
                    updateStatus("Unauthorized: Check API Key", "error");
                    return;
                }
                return res.json();
            })
            .then(data => { if(data) updateStatus(`${mode} Synced!`, 'success'); })
            .catch(err => { updateStatus(`Server Disconnected`, 'error'); });
        }

        // NEW HELPER: Shuts down radar cleanly if it's currently running
        function disableRadarIfActive() {
            if (autoToggle.checked) {
                autoToggle.checked = false;
                toggleAutoTrack(); // Triggers the clean UI reset and kills the GPS watcher
            }
        }

        function sendRealLocation() {
            disableRadarIfActive(); // <-- Stops radar before manual sync
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => { postData(pos.coords.latitude, pos.coords.longitude, "Manual GPS"); }, 
                    (err) => { updateStatus(`GPS Failed: ${err.message}`, 'error'); }, 
                    { enableHighAccuracy: true, timeout: 15000 } 
                );
            } else {
                updateStatus(`Browser not supported`, 'error');
            }
        }

        function simulateAway() {
            disableRadarIfActive(); // <-- Stops radar before simulating away
            postData(0.0001, 0.0001, "Simulation");
        }

        function toggleAutoTrack() {
            if (autoToggle.checked) {
                radarIcon.classList.add('radar-active');
                radarIcon.style.color = 'var(--accent-color)';
                updateStatus(`Acquiring satellite lock...`, 'info');
                
                if (navigator.geolocation) {
                    watchId = navigator.geolocation.watchPosition(
                        (pos) => { 
                            const now = Date.now();
                            if (now - lastSentTime >= 5000) {
                                postData(pos.coords.latitude, pos.coords.longitude, "Auto-Sync"); 
                                lastSentTime = now; 
                            }
                        },
                        (err) => {
                            console.warn("GPS Error Code:", err.code, err.message);
                            if (err.code === 1) {
                                updateStatus(`GPS Permission Denied`, 'error');
                                autoToggle.checked = false; 
                                toggleAutoTrack(); 
                            } else {
                                updateStatus(`GPS Signal Weak... Retrying`, 'info');
                            }
                        },
                        { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
                    );
                } else {
                    updateStatus(`Browser not supported`, 'error');
                    autoToggle.checked = false;
                }
            } else {
                radarIcon.classList.remove('radar-active');
                radarIcon.style.color = 'inherit';
                
                if (watchId !== null) {
                    navigator.geolocation.clearWatch(watchId);
                    watchId = null;
                }
                updateStatus(`Radar Paused`, 'text-muted');
            }
        }
    </script>
</body>
</html>
