<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGuard | Secure Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0f172a;       /* Deep Slate */
            --card-bg: #1e293b;       /* Lighter Slate for contrast */
            --accent-color: #3b82f6;  /* Vibrant Blue */
            --accent-hover: #2563eb;
            --text-main: #f8fafc;     /* Crisp White */
            --text-muted: #cbd5e1;    /* High-contrast light grey */
            --border-color: #334155;  /* Visible separator lines */
        }

        body { 
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 0%, #1f1f2e 0%, transparent 70%);
            color: var(--text-main); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Inter', sans-serif;
        }

        /* Subtle entrance animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card { 
            background: var(--card-bg); 
            padding: 45px 35px; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 400px; 
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            animation: fadeIn 0.6s ease-out forwards;
        }

        .header-icon { 
            font-size: 2.8rem; 
            color: var(--accent-color); 
            margin-bottom: 24px; 
            filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.4)); 
        }

        .card-title { font-weight: 700; letter-spacing: -0.5px; margin-bottom: 5px; color: var(--text-main); }
        .card-subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px; }

        /* Clean floating labels */
        .form-floating { margin-bottom: 20px; }
        
        .form-control { 
            background-color: var(--bg-dark); 
            border: 1px solid var(--border-color); 
            color: var(--text-main); 
            border-radius: 8px;
        }
        
        .form-control:focus { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            border-color: var(--accent-color); 
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); 
        }

        .form-floating label { color: var(--text-muted); padding-left: 15px; }
        
        /* Ensures autofill doesn't ruin the dark theme */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px var(--bg-dark) inset !important;
            -webkit-text-fill-color: var(--text-main) !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .btn-primary { 
            background: var(--accent-color); 
            border: none; 
            width: 100%; 
            padding: 14px; 
            font-weight: 600; 
            letter-spacing: 0.3px;
            border-radius: 8px; 
            transition: all 0.2s ease;
            margin-top: 10px;
            color: white;
        }

        .btn-primary:hover { 
            background: var(--accent-hover); 
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:active { transform: translateY(1px); }

        .error-badge { 
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem; 
            margin-bottom: 20px; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <i class="fa-solid fa-shield-halved header-icon"></i>
        <h3 class="card-title">SmartGuard</h3>
        <p class="card-subtitle">Admin Access Portal</p>
        
        {% if error %}
            <div class="error-badge">
                <i class="fa-solid fa-circle-exclamation"></i> 
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="form-floating">
                <input type="text" class="form-control" id="usernameInput" name="username" placeholder="Admin Username" required autocomplete="off">
                <label for="usernameInput">Admin Username</label>
            </div>
            
            <div class="form-floating">
                <input type="password" class="form-control" id="passwordInput" name="password" placeholder="Password" required>
                <label for="passwordInput">Password</label>
            </div>
            
            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-lock me-2"></i>Authenticate</button>
        </form>
    </div>

</body>
</html>
